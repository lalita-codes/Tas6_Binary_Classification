data:  #contain information about data
  raw_path: data/raw/creditcard.csv  #to read original data
  processed_path: data/processed/data.csv  #To read data after preprocessing

training:    #store info about model
  test_size: 0.2   # 20% of data used for testing
  random_state: 42  # This will fix  random split. We can train/test split same percentage every time 

model:
  model_type: logistic_regression   # Tells which algorithm is used

models:
  logistic_regression:
    max_iter: 1000
    class_weight: balanced

  random_forest:
    n_estimators: 100
    max_depth: 10
    random_state: 42
    class_weight: balanced
